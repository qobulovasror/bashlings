      <stop offset="0%" stop-color="#3eaf7c"/>
      <stop offset="100%" stop-color="#42d392"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
