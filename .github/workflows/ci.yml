name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI build + unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build --release
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: cargo test
        run: cargo test --manifest-path cli/Cargo.toml

      - name: cargo clippy (deny warnings)
        run: cargo clippy --manifest-path cli/Cargo.toml --release --all-targets -- -D warnings

  solutions:
    name: 101 solutions pass
    runs-on: ubuntu-latest
    needs: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ubuntu-latest-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-

      - name: Build bashlings
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: Run all 101 solutions
        run: ./scripts/test-solutions.sh

  shellcheck:
    name: ShellCheck on exercises + solutions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint .solutions/ (production-grade)
        # Solutions must be clean. Some pedagogical idioms are excluded:
        # SC2086 — word splitting (often intentional in exercises)
        # SC1091 — source files we can't resolve
        # SC2216 — piping to echo (intentional in pipefail demo)
        # SC2088 — literal tilde in quotes (we WANT it as text in SSH command strings)
        run: shellcheck --severity=warning --exclude=SC2086,SC1091,SC2216,SC2088 .solutions/*/*.sh

      - name: Lint exercises/ (informational only)
        # Exercise files start broken on purpose — don't fail the build.
        run: shellcheck --severity=error exercises/*/*.sh || true

  docs:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build docs
        run: npm run docs:build
