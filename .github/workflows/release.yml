name: Release

# Tag push'da (masalan `v0.1.0`) har platforma uchun binar quriladi,
# sha256 hisoblanadi va GitHub Release'ga yuklanadi. Tag versiyasi
# cli/Cargo.toml dagi versiyaga mos bo'lishi kerak.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, linker: gcc-aarch64-linux-gnu }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.linker
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          set -eu
          target="${{ matrix.target }}"
          bindir="cli/target/$target/release"
          binname=bashlings
          [ "${{ runner.os }}" = "Windows" ] && binname=bashlings.exe
          out="bashlings-$target.tar.gz"
          mkdir -p dist
          tar -C "$bindir" -czf "dist/$out" "$binname"
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$out" > "$out.sha256"
            else
              shasum -a 256 "$out" > "$out.sha256"
            fi
          )

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Ixtiyoriy: CARGO_REGISTRY_TOKEN secret o'rnatilgan bo'lsa crates.io'ga publish.
  # Token yo'q bo'lsa step o'tkazib yuboriladi (xato bermaydi).
  crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked --manifest-path cli/Cargo.toml
